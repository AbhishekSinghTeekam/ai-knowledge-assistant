services:
  frontend:
    profiles: [frontend]
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080

  api:
    profiles: [api]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=knowledge_db;Username=admin;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
    depends_on:
      - postgres
      - qdrant
      - seq

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: knowledge_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  qdrant_data:
  seq_data:
